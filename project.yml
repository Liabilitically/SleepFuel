name: SleepFuel
options:
  bundleIdPrefix: com.calyantech
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  SleepFuel:
    type: application
    platform: iOS
    sources:
      - SleepFuel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.calyantech.sleepfuel
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: SleepFuel
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
